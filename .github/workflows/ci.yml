name: CI

on:
  push:
    branches: [main, testing]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Run clippy (default features)
        run: cargo clippy --locked --all-targets --no-default-features -- -D warnings
      - name: Install Tesseract (for ocr feature)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libtesseract-dev libleptonica-dev clang
      - name: Run clippy (ocr feature)
        run: cargo clippy --locked --all-targets --features ocr -- -D warnings
      - name: Run clippy (ocrs feature)
        run: cargo clippy --locked --all-targets --features ocrs -- -D warnings

  test:
    name: Test - ${{ matrix.os }} / ${{ matrix.rust }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
        include:
          - os: ubuntu-latest
            rust: beta
    steps:
      - uses: actions/checkout@v6
      - name: Install toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --locked --verbose
      - name: Test (default features)
        run: cargo test --locked --verbose

  test-ocr:
    name: Test - OCR feature
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install Tesseract
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libtesseract-dev libleptonica-dev clang
      - name: Build with OCR feature
        run: cargo build --locked --features ocr --verbose
      - name: Test with OCR feature
        run: cargo test --locked --features ocr --verbose

  test-ocrs:
    name: Test - ocrs (ONNX) feature
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build with ocrs feature
        run: cargo build --locked --features ocrs --verbose
      # Unit tests for the ocrs backend do not hit the network — they only
      # exercise path resolution and error reporting.
      - name: Test with ocrs feature
        run: cargo test --locked --features ocrs --verbose

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Tesseract (needed when --all-features is set)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libtesseract-dev libleptonica-dev clang
      - name: Build docs
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --locked --no-deps --all-features

  msrv:
    name: MSRV check (1.82)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install pinned toolchain (1.82)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.82"
      - uses: Swatinem/rust-cache@v2
      - name: Build on MSRV
        run: cargo build --locked --verbose

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    # Audit failures are informational only: external dependencies may have
    # unfixed advisories that we cannot address immediately.
    continue-on-error: true
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run cargo-audit
        run: cargo audit --deny warnings || true
