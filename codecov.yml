coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: false
    patch:
      default:
        target: 70%
        threshold: 5%
        informational: true

  ignore:
    - "src/main.rs"       # binary entry / argument parsing is exercised via CLI tests
    - "src/ui.rs"         # terminal rendering is mostly presentational
    - "tests/**"
    - "target/**"

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false
